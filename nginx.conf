server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html/views;
    index index.html;

    location /assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    location /controllers/ {
        alias /usr/share/nginx/html/controllers/;
    }

    location /models/ {
        alias /usr/share/nginx/html/models/;
    }
}
