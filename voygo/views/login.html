<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>

<div class="background"></div>

<div class="login-container">

    <!-- Logo -->
    <div class="logo">
        <!-- Remplace le src par ton logo -->
        <img src="../assets/images/banner.png" alt="Logo">
    </div>

    <h2>Se connecter</h2>
    <p class="subtitle">Entrez vos identifiants pour vous connecter</p>

    <form id="login-form">
        <input type="email" placeholder="email@domain.com" id="email" required>

        <input type="password" placeholder="password" id="password" required>

        <div class="space">
            <span><a href="#" id="forgot-password-link">Mot de passe oublié ?</a></span>
        </div>
        <button class="email-btn">Se connecter</button>

        <div class="separator">
            <span>Pas de compte ? <a href="signup.html">Créer un compte</a></span>
        </div>

        <button class="google-btn">
            <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google">
            Google
        </button>

        <p class="terms">
            By clicking continue, you agree to our 
            <a href="#">Terms of Service</a> and 
            <a href="#">Privacy Policy</a>
        </p>
    </form>

</div>

<!-- Modal for forgot password -->
<div id="forgot-password-modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Mot de passe oublié</h2>
        <p>Entrez votre email pour recevoir un lien de réinitialisation.</p>
        <input type="email" id="forgot-email" placeholder="email@domain.com" required>
        <button id="send-btn">Envoyer</button>
    </div>
</div>
    
<script>
    // Get the modal
    var modal = document.getElementById('forgot-password-modal');

    // Get the link that opens the modal
    var link = document.getElementById('forgot-password-link');

    // Get the <span> element that closes the modal
    var span = document.getElementsByClassName('close')[0];

    // When the user clicks the link, open the modal
    link.onclick = function(event) {
        event.preventDefault();
        modal.style.display = 'block';
    }

    // When the user clicks on <span> (x), close the modal
    span.onclick = function() {
        modal.style.display = 'none';
    }

    // When the user clicks anywhere outside of the modal, close it
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    }

    // Handle send button
    document.getElementById('send-btn').onclick = function() {
        var email = document.getElementById('forgot-email').value;
        if (email) {
            alert('Email envoyé à ' + email);
            modal.style.display = 'none';
        } else {
            alert('Veuillez entrer un email valide.');
        }
    }
</script>

</body>
</html>
