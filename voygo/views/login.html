<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="voygo\assets\css\login.css">
</head>
<body>

<div class="background"></div>

<div class="login-container">

    <!-- Logo -->
    <div class="logo">
        <!-- Remplace le src par ton logo -->
        <img src="voygo\assets\images\banner.png" alt="Logo">
    </div>

    <h2>Create an account</h2>
    <p class="subtitle">Enter your email to sign up for this app</p>

    <form>
        <input type="email" placeholder="email@domain.com" required>

        <button class="email-btn">Sign up with email</button>

        <div class="separator">
            <span>or continue with</span>
        </div>

        <button class="google-btn">
            <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google">
            Google
        </button>

        <p class="terms">
            By clicking continue, you agree to our 
            <a href="#">Terms of Service</a> and 
            <a href="#">Privacy Policy</a>
        </p>
    </form>

</div>

</body>
</html>
