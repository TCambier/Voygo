<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Réinitialiser le mot de passe</title>
<link rel="stylesheet" href="../assets/css/login.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>
    <script type="module" src="../controllers/headerController.js"></script>

    <div class="page-body">
        <div class="background"></div>

        <div class="login-container">
            <div class="logo">
                <img src="../assets/images/banner.png" alt="Logo">
            </div>

            <h2>Nouveau mot de passe</h2>
            <p class="subtitle">Choisissez un mot de passe sécurisé.</p>

            <form id="reset-form">
                <input type="password" placeholder="Nouveau mot de passe" id="new-password" required>
                <input type="password" placeholder="Confirmer le mot de passe" id="confirm-password" required>
                <div class="error-message" id="reset-error-message"></div>
                <button type="submit" class="email-btn" id="reset-submit">Réinitialiser</button>
            </form>

            <div class="separator">
                <span><a href="login.html">Retour à la connexion</a></span>
            </div>
        </div>
    </div>

<script type="module" src="../controllers/resetPasswordController.js"></script>
</body>
</html>
