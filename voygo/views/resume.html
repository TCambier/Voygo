<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voygo - Resume</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>
    <script type="module" src="../controllers/headerController.js"></script>

    <main class="planning-page resume-page">
        <section class="planning-hero">
            <div class="planning-hero-text">
                <span class="planning-eyebrow">Planification</span>
                <h1>Resume de votre voyage</h1>
                <p>Retrouvez en un seul endroit votre budget, vos infos de planning et la vue carte dans une synthese unique.</p>
            </div>
            <div class="planning-hero-meta">
                <div class="meta-item">
                    <span class="meta-label">Destination</span>
                    <span id="resume-trip-name">-</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Dates</span>
                    <span id="resume-dates">-</span>
                </div>
            </div>
        </section>

        <div class="planning-nav-box">
            <nav class="planning-nav" aria-label="Navigation du voyage">
                <a href="planning.html">Planning</a>
                <a href="resume.html" class="is-active" aria-current="page">Résumé</a>
                <a href="agenda.html">Agenda</a>
                <a href="carte.html">Carte</a>
                <a href="budget.html">Budget</a>
            </nav>
        </div>

        <section class="resume-grid">
            <article class="panel resume-panel resume-overview-panel" id="resume-overview-panel">
                <div class="panel-title-row">
                    <h2>Synthese complete</h2>
                    <button type="button" class="btn-secondary resume-export-btn" id="resume-export-pdf-btn">
                        <i class='bx bx-download'></i>
                        Exporter Voyage (PDF)
                    </button>
                </div>
                <div class="resume-kpi-grid resume-kpi-grid-wide" id="resume-overview-kpis"></div>

                <div class="resume-highlights" id="resume-highlights"></div>

                <div class="resume-insights-grid" id="resume-insights"></div>

                <div class="resume-overview-lists">
                    <section class="resume-list-block">
                        <h3>Budget</h3>
                        <div class="resume-list" id="resume-budget-list"></div>
                    </section>
                    <section class="resume-list-block">
                        <h3>Planning</h3>
                        <div class="resume-list" id="resume-planning-list"></div>
                    </section>
                </div>
            </article>

            <article class="panel resume-panel resume-map-panel" id="resume-carte-panel">
                <div class="panel-title-row">
                    <h2>Carte</h2>
                </div>
                <div class="carte-stats" id="resume-carte-stats"></div>
                <div class="carte-map" id="resume-map" role="img" aria-label="Carte du resume"></div>
                <div class="activity-empty muted" id="resume-map-empty">Aucune activite localisable pour ce voyage.</div>
                <div class="resume-map-activities" id="resume-map-activities"></div>
            </article>
        </section>

        <span class="settings-feedback" id="resume-note"></span>
    </main>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script type="module">
        import { requireAuth } from '../controllers/authGuardController.js';
        await requireAuth();
    </script>

    <script type="module" src="../controllers/resumePageController.js"></script>
</body>
</html>
