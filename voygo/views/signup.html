<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="../assets/css/login.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>
    <script type="module" src="../controllers/headerController.js"></script>

    <div class="page-body">
        <div class="background"></div>

        <div class="login-container">

    <!-- Logo -->
    <div class="logo">
        <!-- Remplace le src par ton logo -->
        <img src="../assets/images/banner.png" alt="Logo">
    </div>

    <h2>Créer un compte</h2>
    <form id="signup-form">
        <input type="text" placeholder="Prénom" id="first_name" required>

        <input type="text" placeholder="Nom" id="last_name" required>

        <input type="email" placeholder="Email" id="email" required>
        <div class="error-message" id="email-error-message">Cette adresse email existe déjà</div>

        <input type="password" placeholder="Mot de passe" id="password" required>
        <div class="error-message" id="password-error-message">Le mot de passe doit contenir au minimum une majuscule, une minuscule, un chiffre et un symbole</div>

        <button type="submit" id="signup-btn" class="email-btn">Créer un compte</button>

         <div class="separator">
            <span>Vous avez déjà un compte ? <a href="login.html">Se connecter</a></span>
        </div>

    </form>

        </div> <!-- /.login-container -->
    </div> <!-- /.page-body -->

<!-- Modal de succes -->
<div id="success-modal" class="modal">
    <div class="modal-content">
        <h2>Verification requise</h2>
        <p>Un email de verification a ete envoye. Cliquez sur le lien recu pour activer votre compte.</p>
        <button id="close-signup-modal" class="email-btn">Fermer</button>
    </div>
</div>

<script type="module" src="../controllers/signupController.js"></script>

</body>
</html>
